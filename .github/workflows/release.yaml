name: Release Docker image

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: # manual trigger

jobs:
  publish:
    uses: josmase/workflows/.github/workflows/docker-build.yaml@main
    with:
      registry_url: ${{ vars.REGISTRY_URL }}
      registry_cache_url: ${{ vars.REGISTRY_CACHE_URL }}
      name: ${{ github.repository }}
      tag: ${{ github.ref_name }}
      push: true
    secrets:
      registry_username: ${{ secrets.REGISTRY_USERNAME }}
      registry_password: ${{ secrets.REGISTRY_PASSWORD }}
    permissions:
      contents: read
      attestations: write

  deploy:
    needs: publish
    uses: josmase/workflows/.github/workflows/deploy-in-repo.yaml@main
    with:
      image-version: ${{ github.ref_name }}
      image-name: artifactory.local.hejsan.xyz/docker/josmase/downloader
      file-path: deploy/base/deployment.yaml
      namespace: default
      kind: deployment
      name: downloader
    permissions:
      contents: write
      deployments: write
